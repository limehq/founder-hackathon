# Static server for the Caterists pitch deck (Vite + React build).
#
# The app is built with Vite `base: '/pitch/'`, so every emitted asset/module
# URL is prefixed with /pitch/. We serve the bundle from that same sub-path so
# the container is self-consistent and slots in behind the gateway with the
# prefix preserved (no rewriting needed on either side).

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Emit relative Location headers so redirects resolve against the real public
    # origin (domain/port/scheme) rather than this container's internal :80.
    absolute_redirect off;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/javascript text/javascript application/json image/svg+xml;

    # Content-hashed build assets — safe to cache forever.
    location /pitch/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files  $uri =404;
    }

    # The SPA itself, under its Vite base path.
    location /pitch/ {
        try_files $uri $uri/ /pitch/index.html;
    }

    # Normalise the bare sub-path, and be friendly if hit directly at the root.
    location = /pitch { return 301 /pitch/; }
    location = /      { return 302 /pitch/; }
}
