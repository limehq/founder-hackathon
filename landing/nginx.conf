# Static server for the Caterists consumer landing page.
#
# Plain HTML/CSS/JS with relative asset paths (Lucide + fonts load from CDNs at
# runtime). It's the site's root app, served at / behind the gateway.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/javascript text/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
