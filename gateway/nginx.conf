# Edge router for the Caterists stack. One public port, two static apps:
#
#   /backoffice/  → backoffice container
#   /pitch/       → pitchdeck container
#   /             → redirect to /backoffice/
#
# Each app serves under its own base path, so proxy_pass keeps the prefix intact
# (no URI part on proxy_pass = original request URI passed through unchanged).

server {
    listen      80;
    server_name _;

    # Relative Location headers → redirects resolve against the real public origin.
    absolute_redirect off;

    # Forwarded headers for the upstreams (inherited by every location below).
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # Local health endpoint (no upstream dependency) for the container HEALTHCHECK.
    location = /healthz {
        access_log   off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Normalise the bare sub-paths to their trailing-slash base.
    location = /backoffice { return 301 /backoffice/; }
    location = /pitch      { return 301 /pitch/; }

    # Apps.
    location /backoffice/ { proxy_pass http://backoffice:80; }
    location /pitch/      { proxy_pass http://pitchdeck:80; }

    # Root and anything else → the back office.
    location / { return 302 /backoffice/; }
}
