# Static server for the Caterists back-office prototype, served under /backoffice/.
#
# It's a CDN-React + in-browser-Babel app: index.html pulls in the .jsx/.css/.png
# assets and Babel transpiles them client-side. Those asset references are relative,
# so the app works under any base path — we serve it from /backoffice/ to match the
# gateway route (and so the container is self-consistent at that path).

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Emit relative Location headers so redirects resolve against the real public
    # origin (domain/port/scheme) rather than this container's internal :80.
    absolute_redirect off;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/javascript text/javascript application/json image/svg+xml;

    # nginx's default mime.types has no `.jsx` entry; Babel fetches them as text
    # regardless, but a JavaScript content type is cleaner.
    location ~* \.jsx$ {
        default_type application/javascript;
        add_header   Cache-Control "public, max-age=300";
    }

    # The app, under its base path.
    location /backoffice/ {
        try_files $uri $uri/ /backoffice/index.html;
    }

    # Normalise the bare path; redirect root for direct (non-gateway) hits.
    location = /backoffice { return 301 /backoffice/; }
    location = /           { return 302 /backoffice/; }
}
